name: Build Windows Vulkan

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          curl -L -o "$env:TEMP\VulkanSDK.exe" "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe"
          Start-Process -Wait -FilePath "$env:TEMP\VulkanSDK.exe" -ArgumentList "--root", "C:\VulkanSDK", "--accept-licenses", "--default-answer", "--confirm-command", "install"

      - name: Set Vulkan env
        shell: pwsh
        run: |
          "C:\VulkanSDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -DLLAMA_VULKAN=ON -DLLAMA_CURL=OFF -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-vulkan
          path: build/bin/Release/
          if-no-files-found: error
