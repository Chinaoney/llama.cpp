name: Build Windows Vulkan

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Install Vulkan SDK
        run: |
          echo "Vulkan SDK found"
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -DLLAMA_VULKAN=ON -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build
        run: |
          cmake --build build --config Release -j4
        shell: pwsh

      - name: Upload llama-server
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-vulkan-x64
          path: build/bin/Release/llama-server.exe
          if-no-files-found: warn

      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-vulkan-all
          path: build/bin/Release/
          if-no-files-found: warn
