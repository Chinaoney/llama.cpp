name: Build Windows Vulkan

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Vulkan SDK
        run: |
          echo "Downloading Vulkan SDK..."
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -OutFile "$env:TEMP\VulkanSDK.exe"
          echo "Installing Vulkan SDK..."
          Start-Process -Wait -FilePath "$env:TEMP\VulkanSDK.exe" -ArgumentList "--root", "C:\VulkanSDK", "--accept-licenses", "--default-answer", "--confirm-command", "install"
          echo "Vulkan SDK installed"

      - name: Add Vulkan to PATH
        run: |
          echo "C:\VulkanSDK\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "VULKAN_SDK=C:\VulkanSDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        run: |
          cmake -B build -DLLAMA_VULKAN=ON -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build
        run: |
          cmake --build build --config Release -j4
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-win-vulkan-all
          path: build/bin/Release/
          if-no-files-found: error
